services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: learner-compass-backend
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      REQUEST_TIMEOUT_MS: 12000
      KEEP_ALIVE_TIMEOUT_MS: 72000
      RATE_LIMIT_MAX_PER_MINUTE: 300
      MAX_SEARCH_RESULTS: 50
      SEARCH_CACHE_TTL_MS: 30000
      SEARCH_CACHE_MAX_ENTRIES: 2000
      REDIS_URL: ${REDIS_URL:-}
      CODE_EXEC_PROVIDER: ${CODE_EXEC_PROVIDER:-judge0}
      CODE_EXEC_API_URL: ${CODE_EXEC_API_URL:-}
      CODE_EXEC_ENABLE_FALLBACK: ${CODE_EXEC_ENABLE_FALLBACK:-true}
      CODE_EXEC_FALLBACK_PROVIDER: ${CODE_EXEC_FALLBACK_PROVIDER:-local-js}
      CODE_EXEC_FALLBACK_API_URL: ${CODE_EXEC_FALLBACK_API_URL:-}
      CODE_EXEC_API_KEY: ${CODE_EXEC_API_KEY:-}
      CODE_EXEC_API_HOST: ${CODE_EXEC_API_HOST:-judge0-ce.p.rapidapi.com}
      CODE_EXEC_REQUEST_TIMEOUT_MS: 12000
      CODE_EXEC_POLL_INTERVAL_MS: 700
      CODE_EXEC_POLL_ATTEMPTS: 20
      CODE_EXEC_MAX_TEST_CASES: 20
      CODE_EXEC_MAX_SOURCE_CHARS: 20000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_URL: https://api.openai.com/v1
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_REQUEST_TIMEOUT_MS: 18000
      OPENAI_MAX_CONTEXT_CHARS: 12000
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_API_URL: https://www.googleapis.com/youtube/v3
      YOUTUBE_DEFAULT_MAX_RESULTS: 6
      YOUTUBE_REQUEST_TIMEOUT_MS: 10000
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: learner-compass-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8090}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
